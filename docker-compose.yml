services:
  backend:
    build: ./backend
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./insurecheck.db
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
      - ./backend/runtime:/app/runtime

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      API_URL_INTERNAL: http://backend:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
